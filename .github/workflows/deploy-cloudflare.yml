name: Cloudflare Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 部署到哪个 Pages 分支
        required: true
        default: main
        type: choice
        options:
          - main
          - dev
      skip_migrate:
        description: 跳过远程数据库迁移
        required: true
        default: false
        type: boolean
      skip_server:
        description: 跳过 Workers 部署
        required: true
        default: false
        type: boolean
      skip_client:
        description: 跳过 Pages 前端部署
        required: true
        default: false
        type: boolean
      api_base:
        description: 手动指定 API_BASE（可留空自动探测）
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - client/**
      - server/**
      - scripts/deploy-cloudflare.mjs
      - package.json
      - package-lock.json
      - .github/workflows/deploy-cloudflare.yml

concurrency:
  group: cloudflare-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Monolith to Cloudflare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }} # 修改点：从 GitHub Secrets 注入 Worker 管理员密码
      JWT_SECRET: ${{ secrets.JWT_SECRET }} # 修改点：从 GitHub Secrets 注入 Worker JWT 密钥
      MONOLITH_API_BASE: ${{ github.event.inputs.api_base || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Worker secrets from GitHub Secrets (optional)
        # 修改点：ADMIN_PASSWORD/JWT_SECRET 缺失时仅告警并跳过，不阻塞 Worker/Pages 部署
        # 修改点：在 server/ 目录执行 wrangler，确保读取到 server/wrangler.toml 的 Worker name
        working-directory: server
        run: |
          if [ -n "${ADMIN_PASSWORD:-}" ]; then
            printf '%s' "$ADMIN_PASSWORD" | npx wrangler secret put ADMIN_PASSWORD
          else
            echo "[warn] ADMIN_PASSWORD 未配置，跳过同步。"
          fi

          if [ -n "${JWT_SECRET:-}" ]; then
            printf '%s' "$JWT_SECRET" | npx wrangler secret put JWT_SECRET
          else
            echo "[warn] JWT_SECRET 未配置，跳过同步。"
          fi

      - name: Deploy via scripted pipeline
        run: |
          args=(--pages-project monolith-client --branch "${TARGET_BRANCH}")
          if [ "${SKIP_MIGRATE}" = "true" ]; then args+=(--skip-migrate); fi
          if [ "${SKIP_SERVER}" = "true" ]; then args+=(--skip-server); fi
          if [ "${SKIP_CLIENT}" = "true" ]; then args+=(--skip-client); fi
          if [ -n "${MONOLITH_API_BASE}" ]; then args+=(--api-base "${MONOLITH_API_BASE}"); fi
          npm run deploy:cloudflare -- "${args[@]}"
        env:
          TARGET_BRANCH: ${{ github.event.inputs.branch || 'main' }}
          SKIP_MIGRATE: ${{ github.event.inputs.skip_migrate || 'false' }}
          SKIP_SERVER: ${{ github.event.inputs.skip_server || 'false' }}
          SKIP_CLIENT: ${{ github.event.inputs.skip_client || 'false' }}
