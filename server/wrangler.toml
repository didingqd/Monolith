name = "monolith-server"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[vars]
# 非敏感配置变量（敏感的用 wrangler secret put）
BLOG_NAME = "Monolith"
# 对外公开域名（用于 sitemap.xml / robots.txt 的绝对 URL）
SITE_ORIGIN = "https://monolith-client.pages.dev"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "monolith-db"
database_id = "260856eb-760d-4a36-aad7-31f8aa1291e9"
migrations_dir = "src/migrations"

# R2 存储桶绑定
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "monolith-assets"

# Analytics Engine 数据集绑定（CF 专属增强分析模块）
# 灵感来源: HanAnalytics (MIT) — https://github.com/uxiaohan/HanAnalytics
# 仅在 Cloudflare 部署时生效，Turso/PG 后端会自动跳过 AE 写入与查询
[[analytics_engine_datasets]]
binding = "AE"
dataset = "monolith_analytics"

# 定时触发器 (每 1 分钟执行一次)
[triggers]
crons = ["* * * * *"]
